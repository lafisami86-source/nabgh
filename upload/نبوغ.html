<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#6366F1;--pd:#4F46E5;--pl:#EEF2FF;--s:#8B5CF6;
  --ok:#10B981;--err:#EF4444;--warn:#F59E0B;
  --bg:#F1F5F9;--sur:#fff;--sur2:#F8FAFC;
  --tx:#1E293B;--tx2:#475569;--tx3:#94A3B8;--bd:#E2E8F0;
  --r:12px;--tr:.22s ease;--f:'Segoe UI','Helvetica Neue',Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#0F172A;--sur:#1E293B;--sur2:#334155;--tx:#F1F5F9;--tx2:#CBD5E1;--tx3:#64748B;--bd:#334155;--pl:#1E1B4B;
}
[data-theme="dark"] .al-ok{background:#064E3B;border-color:#065F46;color:#6EE7B7}
[data-theme="dark"] .al-warn{background:#78350F;border-color:#92400E;color:#FDE68A}
[data-theme="dark"] .al-err{background:#7F1D1D;border-color:#991B1B;color:#FCA5A5}
[data-theme="dark"] .sec{background:var(--sur);border-color:var(--bd)}
[data-theme="dark"] .fi{background:var(--sur2);color:var(--tx);border-color:var(--bd)}
[data-theme="dark"] .sidebar{background:var(--sur);border-color:var(--bd)}
[data-theme="dark"] .topbar{background:var(--sur);border-color:var(--bd)}
[data-theme="dark"] .bnav{background:var(--sur);border-color:var(--bd)}
[data-theme="dark"] .ni:hover{background:var(--sur2)}
[data-theme="dark"] .urow:hover{background:var(--sur2)}
[data-theme="dark"] .tbl th{background:var(--sur2);color:var(--tx3)}
[data-theme="dark"] .tbl tbody tr:hover td{background:var(--sur2)}
[data-theme="dark"] .ntf{background:#065F46;color:#D1FAE5}
[data-theme="dark"] .xpp{background:var(--p);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:100px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}
:focus-visible{outline:2px solid var(--p);outline-offset:2px;border-radius:4px}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--p);outline-offset:1px}
.fi:focus-visible{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
::selection{background:rgba(99,102,241,.2);color:var(--tx)}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button,input,select,textarea{font-family:var(--f)}

/* SHELL */
.shell{display:flex;min-height:100vh}
.sidebar{width:210px;background:var(--sur);border-left:1px solid var(--bd);position:fixed;top:0;bottom:0;right:0;z-index:200;display:flex;flex-direction:column;transition:transform var(--tr)}
.sb-logo{display:flex;align-items:center;gap:8px;padding:.9rem 1rem;border-bottom:1px solid var(--bd)}
.logo-box{width:34px;height:34px;background:linear-gradient(135deg,var(--p),var(--s));border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;cursor:pointer;flex-shrink:0}
.logo-txt{font-weight:900;font-size:1.05rem;color:var(--p);cursor:pointer}
.rp{font-size:.68rem;font-weight:700;padding:.12rem .38rem;border-radius:5px;margin-right:auto}.sb-close{display:none;background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--tx3);padding:4px 6px;border-radius:6px;line-height:1;transition:background var(--tr)}.sb-close:hover{background:var(--bg);color:var(--tx)}
.rp-s{background:#DBEAFE;color:#1D4ED8}.rp-t{background:#D1FAE5;color:#065F46}.rp-p{background:#FEF3C7;color:#92400E}
.sb-nav{overflow-y:auto;flex:1;padding:.3rem 0}
.nav-sec{padding:.55rem .85rem .15rem;font-size:.68rem;font-weight:700;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:.55rem;padding:.52rem .75rem;border-radius:8px;margin:.05rem .4rem;cursor:pointer;transition:all var(--tr);font-size:.82rem;font-weight:600;color:var(--tx2)}
.ni:hover{background:var(--bg);color:var(--tx)}.ni.on{background:var(--pl);color:var(--p);border-right:3px solid var(--p);margin-right:0;padding-right:calc(.75rem - 3px)}
.ni-ic{font-size:.88rem;width:16px;text-align:center;flex-shrink:0}
.nb{background:var(--err);color:#fff;font-size:.65rem;font-weight:700;padding:.07rem .3rem;border-radius:100px;margin-right:auto}
.sb-bot{margin-top:auto;padding:.65rem;border-top:1px solid var(--bd)}
.urow{display:flex;align-items:center;gap:.55rem;padding:.4rem;border-radius:8px;cursor:pointer;transition:background var(--tr)}
.urow:hover{background:var(--bg)}
.uav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}

.main{margin-right:210px;flex:1;min-width:0}
.main.full{margin-right:0}
.topbar{background:var(--sur);border-bottom:1px solid var(--bd);padding:.62rem 1.1rem;display:flex;align-items:center;gap:.65rem;position:sticky;top:0;z-index:100}
.hbg{background:none;border:1.5px solid var(--bd);border-radius:7px;width:30px;height:30px;display:none;flex-direction:column;justify-content:center;align-items:center;gap:4px;cursor:pointer}
.hbg span{width:14px;height:1.5px;background:var(--tx);border-radius:2px;display:block}
.tb-title{font-weight:900;font-size:.93rem;flex:1}
.pg{padding:1rem 1.1rem;display:flex;flex-direction:column;gap:1rem}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bd);z-index:200;padding:.4rem 0 calc(.55rem + env(safe-area-inset-bottom, 0px))}
.bnav-inner{display:flex;justify-content:space-around}
.bni{display:flex;flex-direction:column;align-items:center;gap:.2rem;cursor:pointer;padding:.28rem .5rem;border-radius:8px;min-width:52px}
.bni span:first-child{font-size:1.15rem}.bni span:last-child{font-size:.65rem;font-weight:600;color:var(--tx3)}
.bni.on span:last-child{color:var(--p);font-weight:800}
.bni.on{background:var(--pl);border-radius:10px}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.open{opacity:1;pointer-events:all}

/* GLOBALS */
.ntf{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--ok);color:#fff;padding:.42rem 1.1rem;border-radius:100px;font-size:.8rem;font-weight:700;z-index:800;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.ntf.show{opacity:1;transform:translateX(-50%) translateY(0)}
.xpp{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--p);color:#fff;padding:.4rem 1rem;border-radius:100px;font-size:.82rem;font-weight:800;z-index:800;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap}
.xpp.show{opacity:1;transform:translateX(-50%) translateY(0)}
.moverlay{position:fixed;inset:0;background:rgba(15,23,42,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .22s}
.moverlay.open{opacity:1;pointer-events:all}
.mdl{background:var(--sur);border-radius:16px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;transform:scale(.93);transition:transform .22s}
.moverlay.open .mdl{transform:scale(1)}
.mh{padding:.9rem 1.1rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mh h3{font-size:.95rem;font-weight:900}
.mcls{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--tx3)}
.mb{padding:1.1rem}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:700px){.g2,.g3{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}.ch-grid{grid-template-columns:1fr}
@media(max-width:420px){.g2,.g3{grid-template-columns:1fr}.g4{grid-template-columns:1fr}.ch-grid{grid-template-columns:1fr}

.sec{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:border-color var(--tr);word-break:break-word;overflow-wrap:break-word}
.sh{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--bd)}
.sh h3{font-size:.86rem;font-weight:800}
.sb2{padding:.85rem 1rem}
.sc{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:.95rem .85rem;transition:transform var(--tr),box-shadow var(--tr);overflow-wrap:break-word}.sc:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.sc strong{display:block;font-size:1.35rem;font-weight:900;line-height:1;margin-bottom:.12rem}
.sc span{font-size:.7rem;color:var(--tx3)}
.tup{background:#D1FAE5;color:#065F46}.twn{background:#FEF3C7;color:#92400E}
.strnd{font-size:.66rem;font-weight:700;padding:.1rem .32rem;border-radius:5px}

.btn{display:inline-flex;align-items:center;gap:.35rem;border-radius:9px;font-weight:700;font-size:.8rem;cursor:pointer;transition:all var(--tr);border:none;padding:.44rem .9rem;white-space:nowrap}
.bp{background:var(--p);color:#fff}.bp:hover{background:var(--pd)}
.bo{background:none;border:1.5px solid var(--bd);color:var(--tx2)}.bo:hover{border-color:var(--p);color:var(--p)}
.bok{background:var(--ok);color:#fff}.btn:active{transform:scale(.97)}.bp:active{background:var(--pd)}.bo:active{background:var(--pl)}.bok:active{opacity:.85}.btn:disabled,.btn[disabled]{opacity:.45;cursor:not-allowed;transform:none !important}
.mbar{height:5px;background:var(--bd);border-radius:100px;overflow:hidden}
.mfill{height:100%;border-radius:100px}
.al-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:8px;margin-bottom:.35rem;font-size:.8rem}
.al-ok{background:#D1FAE5;border:1px solid #A7F3D0;color:#065F46}
.al-warn{background:#FEF3C7;border:1px solid #FDE68A;color:#78350F}
.al-err{background:#FEE2E2;border:1px solid #FECACA;color:#991B1B}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:.7rem;font-weight:700;color:var(--tx3);padding:.48rem .65rem;border-bottom:1px solid var(--bd);background:var(--sur2);text-align:right;white-space:nowrap}
.tbl td{font-size:.79rem;padding:.55rem .65rem;border-bottom:1px solid var(--bd);vertical-align:middle}
.tbl tr:last-child td{border:none}.tbl tbody tr:hover td{background:var(--sur2)}
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}.tscroll .tbl{min-width:500px}
.chart{display:flex;flex-direction:column;gap:.55rem}
.crow{display:flex;align-items:center;gap:.7rem}
.clbl{font-size:.75rem;font-weight:600;color:var(--tx2);width:80px;text-align:right;flex-shrink:0}
.cwrap{flex:1;height:20px;background:var(--sur2);border-radius:5px;overflow:hidden;border:1px solid var(--bd)}
.cfill{height:100%;border-radius:5px;display:flex;align-items:center;padding-right:.4rem;justify-content:flex-end}
.cfill span{font-size:.65rem;font-weight:700;color:#fff}
.fi-row{display:flex;flex-direction:column;gap:.2rem;margin-bottom:.8rem}
.fi-row label{font-size:.75rem;font-weight:700;color:var(--tx2)}
.fi{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:.58rem .85rem;font-size:.87rem;outline:none;transition:border-color var(--tr);background:var(--sur);color:var(--tx)}
.fi:focus{border-color:var(--p)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes bounceIn{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.skel{background:linear-gradient(90deg,var(--sur2) 25%,var(--bd) 50%,var(--sur2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
.fu{animation:fadeUp .3s ease both}.fu>*:nth-child(1){animation:fadeUp .3s ease both;animation-delay:.02s}.fu>*:nth-child(2){animation:fadeUp .3s ease both;animation-delay:.06s}.fu>*:nth-child(3){animation:fadeUp .3s ease both;animation-delay:.1s}.fu>*:nth-child(4){animation:fadeUp .3s ease both;animation-delay:.14s}.fu>*:nth-child(n+5){animation:fadeUp .3s ease both;animation-delay:.18s}

@media(max-width:860px){
  .sidebar{transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}.sidebar.open{transform:none}
  .main{margin-right:0}.hbg{display:flex}.bnav{display:block}
  .pg{padding-bottom:68px}
  .topbar{flex-wrap:wrap;gap:.35rem}
  .tb-title{font-size:.82rem}
  #tbStreak,#tbXP{font-size:.68rem;padding:.2rem .45rem}
  .sb-close{display:block}
}
@media(max-width:700px){
  .mob-2{grid-template-columns:1fr !important}
  .mob-3{grid-template-columns:1fr 1fr !important}
  .mob-4{grid-template-columns:1fr 1fr !important}
  .mob-7{grid-template-columns:repeat(4,1fr) !important}
  .sc{padding:.65rem .55rem}
  .sc strong{font-size:1.1rem}
  .clbl{width:55px;font-size:.68rem}
  body{overflow-x:hidden}
}
@media(max-width:420px){
  .mob-2{grid-template-columns:1fr !important}
  .mob-3{grid-template-columns:1fr !important}
  .mob-4{grid-template-columns:1fr !important}
  .mob-7{grid-template-columns:repeat(3,1fr) !important}
  .sc strong{font-size:.95rem}
  .clbl{width:42px;font-size:.62rem}
  .pg{padding:.8rem .75rem}
  [style*="minmax(130px"]{grid-template-columns:repeat(auto-fill,minmax(100px,1fr)) !important}
  [style*="minmax(120px"]{grid-template-columns:repeat(auto-fill,minmax(90px,1fr)) !important}
  [style*="minmax(125px"]{grid-template-columns:repeat(auto-fill,minmax(100px,1fr)) !important}
  [style*="minmax(210px"]{grid-template-columns:1fr !important}
  [style*="minmax(200px"]{grid-template-columns:1fr !important}
  [style*="minmax(220px"]{grid-template-columns:1fr !important}
}
.hidden { display: none !important; }
.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem}
@media(max-width:700px){.plans-grid{grid-template-columns:1fr !important;gap:.7rem}}
</style>
</head>
<body>

<div class="ov" id="ov" onclick="closeSB()"></div>
<div class="ntf" id="ntf"></div>
<div class="xpp" id="xpp"></div>

<!-- CHECKPOINT MODAL -->
<div class="moverlay" id="cpMdl">
  <div class="mdl">
    <div class="mh" style="background:linear-gradient(135deg,var(--p),var(--s));color:#fff">
      <h3>⏸ سؤال سريع!</h3>
      <button type="button" class="mcls" style="color:#fff" onclick="closeCP()">✕</button>
    </div>
    <div class="mb" id="cpBody"></div>
  </div>
</div>

<!-- PAY MODAL -->
<div class="moverlay" id="payMdl">
  <div class="mdl">
    <div class="mh"><h3>💳 إتمام الاشتراك</h3><button type="button" class="mcls" onclick="closePay()">✕</button></div>
    <div class="mb">
      <div style="background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);padding:.85rem;margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;font-size:.84rem;padding:.3rem 0"><span>الخطة</span><strong id="payPlan">مميز</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:.9rem;font-weight:900;border-top:1px solid var(--bd);padding-top:.5rem;margin-top:.35rem"><span>الإجمالي</span><strong id="payTotal" style="color:var(--p)">49 ريال</strong></div>
      </div>
      <div class="fi-row"><label>رقم البطاقة</label><input class="fi" placeholder="0000  0000  0000  0000"></div>
      <div class="mob-2" style="display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.85rem">
        <div class="fi-row"><label>تاريخ الانتهاء</label><input class="fi" placeholder="MM / YY"></div>
        <div class="fi-row"><label>CVV</label><input class="fi" placeholder="•••" type="password" maxlength="3"></div>
      </div>
      <button type="button" id="payBtn" style="width:100%;background:var(--p);color:#fff;border:none;border-radius:9px;padding:.72rem;font-size:.9rem;font-weight:900;cursor:pointer;margin-top:.5rem" onclick="processPay()">🔒 ادفع الآن</button>
      <div style="text-align:center;font-size:.7rem;color:var(--tx3);margin-top:.65rem">🔒 SSL مشفر • ضمان 7 أيام • إلغاء في أي وقت</div>
    </div>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div class="moverlay" id="sucMdl">
  <div class="mdl" style="text-align:center">
    <div class="mb" style="padding:2rem">
      <div style="font-size:3.5rem;animation:bounceIn .6s ease;display:block;margin-bottom:.75rem">🎉</div>
      <h2 style="font-size:1.25rem;font-weight:900;margin-bottom:.4rem">مرحباً في نبغ مميز!</h2>
      <p style="color:var(--tx2);font-size:.84rem;margin-bottom:1rem">تم تفعيل اشتراكك بنجاح</p>
      <div style="background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:100px;padding:.5rem 1.25rem;font-weight:900;font-size:.9rem;display:inline-block;margin-bottom:1.25rem">🎁 +500 XP هدية!</div>
      <button class="btn bp" style="width:100%;justify-content:center;padding:.7rem" onclick="closeSuc()">🚀 ابدأ التعلم!</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="moverlay" id="confirmMdl">
  <div class="mdl">
    <div class="mh"><h3 id="confirmTitle">تأكيد</h3><button type="button" class="mcls" onclick="closeConfirm()">✕</button></div>
    <div class="mb">
      <p id="confirmMsg" style="font-size:.88rem;color:var(--tx2);margin-bottom:1.25rem;line-height:1.6"></p>
      <div style="display:flex;gap:.65rem;justify-content:flex-end">
        <button class="btn bo" onclick="closeConfirm()">إلغاء</button>
        <button class="btn" id="confirmBtn" style="background:var(--err);color:#fff" onclick="doConfirm()">تأكيد</button>
      </div>
    </div>
  </div>
</div>

<!-- CUSTOM FLASHCARD MODAL -->
<div class="moverlay" id="fcCreateMdl">
  <div class="mdl">
    <div class="mh"><h3>➕ بطاقة جديدة</h3><button type="button" class="mcls" onclick="closeFCCreate()">✕</button></div>
    <div class="mb" style="display:flex;flex-direction:column;gap:.85rem">
      <div class="fi-row"><label>السؤال (الوجه)</label><textarea class="fi" id="fcFront" rows="2" placeholder="اكتب السؤال هنا..."></textarea></div>
      <div class="fi-row"><label>الإجابة (الظهر)</label><textarea class="fi" id="fcBack" rows="3" placeholder="اكتب الإجابة هنا..."></textarea></div>
      <div class="fi-row"><label>المادة</label>
        <select class="fi" id="fcSubj">
          <option>رياضيات</option><option>علوم</option><option>عربية</option><option>فيزياء</option><option>إنجليزية</option><option>كيمياء</option><option>تربية إسلامية</option><option>اجتماعيات</option><option>حاسب آلي</option>

function render(){
  const sc=S.screen;
  const isAuth=AUTH_SCREENS.includes(sc);
  const role=S.user&&ROLES[S.user.role]?ROLES[S.user.role]:null;

  // If user exists but role is invalid, reset to landing
  if(S.user&&!role&&!isAuth){S.user=null;S.screen='landing';return render();}

  // shell visibility
  document.getElementById('sidebar').classList.toggle('hidden',isAuth);
  document.getElementById('topbar').style.display=isAuth?'none':'flex';

    document.getElementById('sbname').textContent=S.user.name.split(' ')[0];
    document.getElementById('sbsub').textContent=role.showStreakXP?`⭐ Lv.${S.user.lv} • ${S.user.xp.toLocaleString('ar-SA')} XP`:role.label;
  }

function applyTheme(){
  const cfg=S.tab.cfg||{};
  const theme=cfg.theme||'auto';
  const isDark=theme==='dark'||(theme==='auto'&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  document.documentElement.setAttribute('data-theme',isDark?'dark':'');
  const fs=cfg.fontSize||'medium';
  document.body.style.fontSize=fs==='small'?'14px':fs==='large'?'18px':'16px';
}

// ═══════════════════════════════════
// SAVE/LOAD STATE (Feature 3)
// ═══════════════════════════════════
let _saveTimer=null;
function debounceSave(){clearTimeout(_saveTimer);_saveTimer=setTimeout(saveState,500);}
function saveState(){
  if(!S.user)return;
  try{
    const d={user:{name:S.user.name,xp:S.user.xp,lv:S.user.lv,streak:S.user.streak,plan:S.user.plan,role:S.user.role,initials:S.user.initials,email:S.user.email},cfg:S.tab.cfg,billing:S.billing,lastRewardDate:S.tab.lastRewardDate,customCards:S.tab.customCards||[]};
    localStorage.setItem('nabgh_state',JSON.stringify(d));
  }catch(e){}
}
function loadState(){
  try{
    // Allow reset via URL: ?reset or #reset
    if(location.search.includes('reset')||location.hash.includes('reset')){
      localStorage.removeItem('nabgh_state');
      location.hash='';location.search='';
      return false;
    }
    const raw=localStorage.getItem('nabgh_state');
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(d.user){
      // Validate role exists
      if(!d.user.role||!DEMO_USERS[d.user.role]){
        localStorage.removeItem('nabgh_state');
        return false;
      }
      S.user={...DEMO_USERS[d.user.role],...d.user};
      // Ensure critical properties exist
      if(typeof S.user.xp!=='number')S.user.xp=0;
      if(typeof S.user.lv!=='number')S.user.lv=1;
      if(typeof S.user.streak!=='number')S.user.streak=0;
      if(!S.user.name)S.user.name='مستخدم';
      if(!S.user.initials)S.user.initials='م';
      if(!S.user.plan)S.user.plan='free';
      S.billing=d.billing||'monthly';
    }
    if(d.cfg)S.tab.cfg={...S.tab.cfg,...d.cfg};
    if(d.lastRewardDate)S.tab.lastRewardDate=d.lastRewardDate;
    if(d.customCards&&Array.isArray(d.customCards)){S.tab.customCards=d.customCards;d.customCards.forEach(c=>{if(c&&c.id&&!FC_CARDS.find(fc=>fc.id===c.id))FC_CARDS.push(c);});}
    return !!d.user;
  }catch(e){localStorage.removeItem('nabgh_state');return false;}
}

// ═══════════════════════════════════
// SOUND EFFECTS (Feature 10)
// ═══════════════════════════════════
const SFX={
  _ctx:null,
  _getCtx(){if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();return this._ctx;},
  _tone(freq,dur,type='sine',vol=0.15){
    if(!S.tab.cfg?.sound)return;
    try{const c=this._getCtx();const o=c.createOscillator();const g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);}catch(e){}
  },
  correct(){this._tone(523,.1);setTimeout(()=>this._tone(659,.1),80);setTimeout(()=>this._tone(784,.15),160);},
  wrong(){this._tone(300,.15);setTimeout(()=>this._tone(220,.2),120);},
  xp(){this._tone(880,.08,'sine',0.1);setTimeout(()=>this._tone(1100,.12,'sine',0.1),60);},
  flip(){this._tone(600,.06,'sine',0.08);},
  badge(){this._tone(523,.1);setTimeout(()=>this._tone(659,.1),100);setTimeout(()=>this._tone(784,.1),200);setTimeout(()=>this._tone(1047,.2),300);},
  click(){this._tone(500,.03,'sine',0.05);},
};

function openFCCreate(){document.getElementById('fcCreateMdl').classList.add('open');}
function closeFCCreate(){document.getElementById('fcCreateMdl').classList.remove('open');}
function createFC(){
  const f=document.getElementById('fcFront')?.value?.trim();
  const b=document.getElementById('fcBack')?.value?.trim();
  const sub=document.getElementById('fcSubj')?.value||'رياضيات';
  if(!f||!b){showN('⚠️ أدخل السؤال والإجابة');return;}
  const id=Date.now();
  const card={id,f,b,sub,due:0,interval:1,ease:2.5,reps:0};
  FC_CARDS.push(card);
  if(!S.tab.customCards)S.tab.customCards=[];
  S.tab.customCards.push(card);
  saveState();
  closeFCCreate();
  showN('✅ تم إنشاء البطاقة!');
  SFX.badge();
  render();
}

    const list=OB.curricula[S.ob.country]||OB.curricula['intl'];

    </div>`;
  return `
  <div style="min-height:100vh;background:var(--bg)">
    <div style="background:var(--sur);border-bottom:1px solid var(--bd);padding:.7rem 1.1rem;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px;font-weight:900;color:var(--p)"><div style="width:30px;height:30px;background:linear-gradient(135deg,var(--p),var(--s));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:.9rem">ن</div>نبغ</div>
      ${cur!=='done'?`<button style="background:none;border:none;cursor:pointer;font-size:.8rem;color:var(--tx3)" onclick="go(ROLES[S.user.role].home)">تخطي</button>`:''}
    </div>
    <div style="background:var(--sur);border-bottom:1px solid var(--bd);padding:.5rem 1rem">
      <div style="height:4px;background:var(--bd);border-radius:100px;max-width:480px;margin:0 auto;overflow:hidden">
        <div style="height:100%;width:${isNaN(pct)?0:pct}%;background:linear-gradient(90deg,var(--p),var(--s));border-radius:100px;transition:width .4s"></div>
      </div>
    </div>
    <div style="max-width:560px;margin:0 auto;padding:1.5rem 1rem">${body}</div>
  </div>`;}

function loginAs(role){
  S.user={...DEMO_USERS[role]};
  S.ob.step=0;
  saveState();
  go(ROLES[role].home);
}

function loginManual(){
  const e=document.getElementById('loginEmail')?.value||'';
  const p=document.getElementById('loginPass')?.value||'';
  if(!e||!p){showN('⚠️ أدخل البريد وكلمة المرور');return;}
  // demo: any email works, role from ob.role or default student
  const role=S.ob.role||'student';
  S.user={...DEMO_USERS[role],email:e,name:e.split('@')[0]};
  saveState();
  go(ROLES[role].home);
}

function registerUser(){
  const role=S.ob.role;
  if(!role){showN('⚠️ اختر دورك أولاً');return;}
  const f=document.getElementById('regFirst')?.value||'';
  const l=document.getElementById('regLast')?.value||'';
  const e=document.getElementById('regEmail')?.value||'';
  const p=document.getElementById('regPass')?.value||'';
  if(!f||!e||!p){showN('⚠️ يرجى ملء جميع الحقول');return;}
  S.user={...DEMO_USERS[role],name:f+' '+l,initials:f[0]+(l[0]||''),email:e};
  S.ob.step=0;
  saveState();
  go('onboarding');
}

function claimReward(){
  const today=new Date().toISOString().split('T')[0];
  const streakMult=S.user.streak>=30?3:S.user.streak>=7?2:S.user.streak>=3?1.5:1;
  const baseXP=Math.floor(Math.random()*41)+10;
  const xp=Math.round(baseXP*streakMult);
  S.user.xp+=xp;
  S.tab.lastRewardDate=today;
  saveState();
  showN(`🎁 مكافأة اليوم: +${xp} XP${streakMult>1?' (x'+streakMult+' مضاعف!)':''}`);
  SFX.badge();
  render();
}

function rExercise(){
  const E=S.exercise;
  if(E.finished) return rExResult();
  const exSubj=S.tab.exSubj||'الكل';
  const filteredQQ=exSubj==='الكل'?QQ:QQ.filter(q=>q.sub===exSubj);
  const subjList=['الكل',...new Set(QQ.map(q=>q.sub))];
  if(!filteredQQ.length) return `<div class="pg"><div style="text-align:center;padding:3rem"><div style="font-size:3rem;margin-bottom:.7rem">📝</div><div style="font-weight:700;font-size:.92rem;color:var(--tx3)">لا توجد تمارين لهذه المادة</div><div style="font-size:.8rem;color:var(--tx3);margin-top:.3rem">اختر مادة أخرى أو "الكل"</div><button class="btn bp" style="margin-top:1rem" onclick="S.tab.exSubj='الكل';render()">عرض الكل</button></div></div>`;
  const qIdx=E.qIdx%filteredQQ.length;
  const q=filteredQQ[qIdx];
  const totalQ=filteredQQ.length;
  return `<div class="pg">
  <div style="display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.65rem">
    ${subjList.map(s=>`<button style="padding:.25rem .65rem;border-radius:100px;border:1.5px solid ${s===exSubj?'var(--p)':'var(--bd)'};background:${s===exSubj?'var(--p)':'var(--sur)'};color:${s===exSubj?'#fff':'var(--tx2)'};font-size:.72rem;font-weight:700;cursor:pointer" onclick="S.tab.exSubj='${s}';S.exercise={qIdx:0,answered:null,checked:false,correct:0,results:[],finished:false};render()">${s==='الكل'?'الكل':s}</button>`).join('')}

    <span style="font-size:.76rem;color:var(--ok)">✅${E.correct}</span>
  </div>
  <div style="display:flex;gap:.28rem">${QQ.map((_,i)=>`<div style="flex:1;height:4px;border-radius:100px;background:${i<E.qIdx?(E.results[i]?'var(--ok)':'var(--err)'):i===E.qIdx?'var(--p)':'var(--bd)'}"></div>`).join('')}</div>
  <div class="sec">
    <div style="display:flex;align-items:center;gap:.6rem;padding:.7rem .95rem;border-bottom:1px solid var(--bd)">
      <span style="background:var(--pl);color:var(--p);padding:.18rem .52rem;border-radius:5px;font-size:.69rem;font-weight:700">س${E.qIdx+1}</span>
      <span style="background:var(--sur2);border:1px solid var(--bd);padding:.18rem .52rem;border-radius:5px;font-size:.69rem;font-weight:700">${q.lbl}</span>

function rFlashcards(){
  const fc=S.fc;const now=Date.now();
  const subs=['الكل',...new Set(FC_CARDS.map(c=>c.sub))];
  const cards=fc.sub==='الكل'?FC_CARDS:FC_CARDS.filter(c=>c.sub===fc.sub);
  const due=cards.filter(c=>c.due<=now);

  if(!due.length&&cards.length) return `<div class="pg">

      <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap">
        ${subs.filter(s=>s!=='الكل').map(s=>`<button style="padding:.35rem .8rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:.75rem;font-weight:700;cursor:pointer" onclick="S.fc.sub='${s}';render()">${s}</button>`).join('')}
      </div>
    </div>
  </div>
  <div style="display:flex;gap:.65rem;flex-wrap:wrap">
    <button class="btn bp" onclick="openFCCreate()">➕ بطاقة جديدة</button>
    <button class="btn bo" onclick="go('dashboard')">🏠 الرئيسية</button>
  </div></div>`;
  return `<div class="pg">
  <div style="background:linear-gradient(135deg,#1E293B,#0F172A);border-radius:var(--r);padding:1.2rem;color:#fff">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem"><h2 style="font-size:1rem;font-weight:900">🃏 بطاقات المراجعة</h2><div style="display:flex;gap:.4rem"><button onclick="openFCCreate()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;width:28px;height:28px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">+</button><span style="background:rgba(255,255,255,.15);padding:.22rem .65rem;border-radius:100px;font-size:.7rem;font-weight:700">Spaced Repetition</span></div></div>
    <div class="mob-3" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem;margin-bottom:.85rem">
      <div style="background:rgba(255,255,255,.08);border-radius:8px;padding:.55rem;text-align:center"><strong style="display:block;font-size:.95rem;color:var(--warn)">${due.length}</strong><span style="font-size:.65rem;opacity:.7">للمراجعة اليوم</span></div>
      <div style="background:rgba(255,255,255,.08);border-radius:8px;padding:.55rem;text-align:center"><strong style="display:block;font-size:.95rem;color:var(--ok)">${FC_CARDS.filter(c=>c.reps>0).length}</strong><span style="font-size:.65rem;opacity:.7">تم تعلّمها</span></div>
      <div style="background:rgba(255,255,255,.08);border-radius:8px;padding:.55rem;text-align:center"><strong style="display:block;font-size:.95rem">${FC_CARDS.length}</strong><span style="font-size:.65rem;opacity:.7">إجمالي</span></div>

  </div>
  <div style="display:flex;gap:.4rem;flex-wrap:wrap">

function rFCStudy(queue){
  if(!queue||!queue.length){S.fc.mode='result';return rFCResult();}
  const idx=S.fc.idx%queue.length;const card=queue[idx];const flipped=S.fc.flipped;
  return `<div class="pg"><div style="max-width:540px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:1rem">
  <div style="display:flex;align-items:center;justify-content:space-between">

    <button class="btn bo" style="font-size:.73rem" onclick="S.fc.mode='browse';render()">← رجوع</button>
  </div>
  <div style="height:4px;background:var(--bd);border-radius:100px;overflow:hidden"><div style="height:100%;width:${idx/queue.length*100}%;background:linear-gradient(90deg,var(--p),var(--s));border-radius:100px;transition:width .4s"></div></div>
  <div onclick="S.fc.flipped=!S.fc.flipped;render()" style="background:var(--sur);border:2px solid ${flipped?'var(--ok)':'var(--p)'};border-radius:20px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;cursor:pointer;box-shadow:0 6px 20px rgba(99,102,241,.12);position:relative;transition:all .35s">
    <div style="position:absolute;top:.85rem;right:.85rem;font-size:.68rem;font-weight:700;padding:.18rem .52rem;border-radius:100px;background:${flipped?'#D1FAE5':'var(--pl)'};color:${flipped?'#065F46':'var(--p)'}">${flipped?'الإجابة ✅':'السؤال'}</div>
    <div style="font-size:.69rem;color:var(--tx3);margin-bottom:.65rem;font-weight:600">${card.sub}</div>
    <div style="font-size:1rem;font-weight:${flipped?600:800};line-height:1.6;color:${flipped?'var(--tx2)':'var(--tx)'};white-space:pre-line">${flipped?card.b:card.f}</div>
    ${!flipped?`<div style="font-size:.73rem;color:var(--tx3);margin-top:1rem;opacity:.7">اضغط لرؤية الإجابة 👆</div>`:''}
  </div>
  ${flipped?`<div>
    <div style="text-align:center;font-size:.77rem;color:var(--tx2);margin-bottom:.65rem;font-weight:600">كيف كانت إجابتك؟</div>
    <div class="mob-4" style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.5rem">
      ${[['🔴','لم أتذكر',0,'#FEE2E2','#991B1B'],['🟡','صعبة',1,'#FEF3C7','#92400E'],['🟢','جيدة',3,'#D1FAE5','#065F46'],['🔵','سهلة',5,'#DBEAFE','#1D4ED8']].map(([ic,l,q,bg,c])=>`
      <button style="padding:.7rem .4rem;border-radius:11px;border:2px solid transparent;background:${bg};color:${c};font-size:.76rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.28rem;transition:all var(--tr)" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''" onclick="rateFC(${card.id},${q},${queue.length})">
        <span style="font-size:1.1rem">${ic}</span>${l}
      </button>`).join('')}
    </div>
  </div>`:''}
  </div></div>`;}

// LESSON LOGIC
// ═══════════════════════════════════
const FRAMES=LESSONS_DATA.math.frames;
const CPS=[{at:25,q:"إذا f(x)=x³ فما f'(x)؟",opts:['x²','3x²','3x³','2x'],c:1,exp:'قاعدة القوة → 3x²'},{at:60,q:'ميل المماس لـ f(x)=x² عند x=3؟',opts:['3','6','9','12'],c:1,exp:'f\'(3)=6'},{at:88,q:'متى الدالة متزايدة؟',opts:["f'<0","f'=0","f'>0","f''>0"],c:2,exp:"f'(x)>0 → متزايدة"}];

function togglePlay(){
  S.lesson.playing=!S.lesson.playing;
  const pb=document.getElementById('pbtn');const po=document.getElementById('plov');
  if(pb)pb.textContent=S.lesson.playing?'⏸':'▶';
  if(po)po.style.opacity=S.lesson.playing?'0':'1';
  if(S.lesson.playing)runL();else clearInterval(S.lesson._af);
}
function runL(){
  clearInterval(S.lesson._af);
  S.lesson._af=setInterval(()=>{
    if(!S.lesson.playing){clearInterval(S.lesson._af);return;}
    S.lesson.pct=Math.min(S.lesson.pct+100/S.lesson.totalSec/30,100);
    updateLUI();checkLCP();
    if(S.lesson.pct>=100){clearInterval(S.lesson._af);S.lesson.playing=false;showXP('+50 XP ✅');SFX.xp();}
  },1000/30);
}
function updateLUI(){
  const tf=document.getElementById('tf');const ct=document.getElementById('ct');
  if(tf)tf.style.width=S.lesson.pct+'%';
  if(ct)ct.textContent=fmtS(Math.round(S.lesson.pct/100*S.lesson.totalSec));
  const ch=Math.min(4,Math.floor(S.lesson.pct/20));
  if(ch!==S.lesson.chap){S.lesson.chap=ch;const vf=document.getElementById('vf');const vs=document.getElementById('vs');if(vf&&FRAMES[ch]){vf.style.opacity='0';setTimeout(()=>{vf.textContent=FRAMES[ch][0];vs.textContent=FRAMES[ch][1];vf.style.opacity='1';},300);}}
}
function checkLCP(){CPS.forEach(cp=>{if(!S.lesson.cpDone.includes(cp.at)&&S.lesson.pct>=cp.at){S.lesson.cpDone.push(cp.at);clearInterval(S.lesson._af);S.lesson.playing=false;openCP(cp);}});}
function openCP(cp){
  document.getElementById('cpBody').innerHTML=`<div style="font-weight:800;font-size:.97rem;line-height:1.55;margin-bottom:1rem">${cp.q}</div>
  <div>${cp.opts.map((o,i)=>`<div class="opt" data-i="${i}" onclick="ansCP(${i},${cp.c},'${cp.exp.replace(/'/g,"\\\'")}')"><div class="okey">${['أ','ب','ج','د'][i]}</div>${o}</div>`).join('')}</div>
  <div id="cpfb" style="display:none;margin-top:.75rem;padding:.7rem;border-radius:9px;font-size:.83rem;gap:.45rem;align-items:flex-start"></div>
  <div style="display:flex;gap:.65rem;margin-top:1rem"><button class="btn bo" onclick="closeCP()">تخطي</button><button class="btn bok" id="cpcont" style="display:none" onclick="closeCP()">أكمل الدرس ←</button></div>`;
  document.getElementById('cpMdl').classList.add('open');
}
function ansCP(idx,c,exp){
  document.querySelectorAll('#cpBody .opt').forEach((o,i)=>{o.classList.add('locked');if(i===c)o.classList.add('correct');else if(i===idx&&idx!==c)o.classList.add('wrong');});
  const ok=idx===c;const fb=document.getElementById('cpfb');
  if(fb){fb.style.display='flex';fb.style.background=ok?'#D1FAE5':'#FEE2E2';fb.style.border=`1px solid ${ok?'#A7F3D0':'#FECACA'}`;fb.style.color=ok?'#065F46':'#991B1B';fb.innerHTML=`<span>${ok?'✅':'❌'}</span><div><strong>${ok?'صحيح!':'خطأ!'}</strong><br>${exp}</div>`;}
  document.getElementById('cpcont').style.display='inline-flex';
  if(ok)showXP('+10 XP ✅');
  SFX.correct();
}
function closeCP(){
  document.getElementById('cpMdl').classList.remove('open');
  if(!S.lesson.playing){S.lesson.playing=true;runL();const pb=document.getElementById('pbtn');const po=document.getElementById('plov');if(pb)pb.textContent='⏸';if(po)po.style.opacity='0';}
}
function seekL(e){const r=e.currentTarget.getBoundingClientRect();S.lesson.pct=Math.max(0,Math.min(100,(1-(e.clientX-r.left)/r.width)*100));updateLUI();}
function skipL(sec){S.lesson.pct=Math.max(0,Math.min(100,S.lesson.pct+sec/S.lesson.totalSec*100));updateLUI();}
function jumpCh(i){S.lesson.chap=i;S.lesson.pct=i*20;updateLUI();render();}
function completeL(){S.lesson.pct=100;S.lesson.playing=false;clearInterval(S.lesson._af);S.user.xp+=50;showXP('+50 XP 🎓 أكملت الدرس!');SFX.badge();saveState();setTimeout(()=>go('exercise'),1500);}
function fmtS(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}

function ansEx(a){if(S.exercise.checked)return;S.exercise.answered=a;SFX.click();render();}
function checkEx(){
  const q=QQ[S.exercise.qIdx];const E=S.exercise;let ok=false;
  if(q.type==='tf')ok=E.answered===q.c;else ok=E.answered===q.c;
  E.checked=true;E.results.push(ok);if(ok){E.correct++;showXP('+'+q.pts+' XP ✅');SFX.correct();}else{SFX.wrong();}render();
}
function nextEx(){const E=S.exercise;if(E.qIdx<QQ.length-1){E.qIdx++;E.answered=null;E.checked=false;}else{E.finished=true;S.user.xp+=E.correct*10;showXP('🏆 +'+(E.correct*10)+' XP!');SFX.xp();}render();}
function skipEx(){const E=S.exercise;E.results.push(null);if(E.qIdx<QQ.length-1){E.qIdx++;E.answered=null;E.checked=false;}else E.finished=true;render();}

async function sendChat(text){
  const msg=(text||document.getElementById('chatIn')?.value||'').trim();
  if(!msg||S.chat.loading)return;
  if(document.getElementById('chatIn'))document.getElementById('chatIn').value='';
  S.chat.messages.push({role:'user',content:msg,time:T()});
  S.chat.history.push({role:'user',content:msg});
  S.chat.loading=true;
  renderChatMsgs();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,
        system:'أنت "نبوغ" المساعد التعليمي الذكي لمنصة نبغ. شخصيتك ودود وصبور. تشرح بعربية مبسطة مع إيموجي. ردودك مختصرة وواضحة.',
        messages:S.chat.history})});
    const data=await res.json();
    if(!res.ok)throw new Error(data?.error?.message||res.status);
    const reply=data.content?.[0]?.text||'عذراً، حاول مرة أخرى.';
    S.chat.history.push({role:'assistant',content:reply});
    S.chat.messages.push({role:'assistant',content:reply,time:T()});
    if(S.user)S.user.xp+=5;
    saveState();
  }catch(e){S.chat.messages.push({role:'assistant',content:`⚠️ خطأ: ${e.message}`,time:T()});}
  S.chat.loading=false;renderChatMsgs();
}
function renderChatMsgs(){render();}

// QUIZ LOGIC
// ═══════════════════════════════════
function startQ(){clearInterval(S.quiz.timer);S.quiz={qIdx:0,right:0,results:[],sel:null,active:true,done:false,sec:15,timer:null};render();startQT();}
function startQT(){clearInterval(S.quiz.timer);S.quiz.sec=15;S.quiz.timer=setInterval(()=>{S.quiz.sec--;const el=document.getElementById('qt');if(!el){clearInterval(S.quiz.timer);return;}el.textContent=S.quiz.sec;if(S.quiz.sec<=0){clearInterval(S.quiz.timer);if(S.quiz.sel===null)ansQ(-1);}},1000);}
function ansQ(idx){
  if(S.quiz.sel!==null)return;clearInterval(S.quiz.timer);S.quiz.sel=idx;
  const q=QUIZ_QS[S.quiz.qIdx];const ok=idx===q.c;if(ok){S.quiz.right++;showXP('+10 XP');SFX.correct();}else{SFX.wrong();}
  S.quiz.results.push(ok);S.quiz.checked=true;render();
  setTimeout(()=>{S.quiz.qIdx++;S.quiz.sel=null;S.quiz.checked=false;if(S.quiz.qIdx>=QUIZ_QS.length){S.quiz.done=true;S.quiz.active=false;if(S.user)S.user.xp+=S.quiz.right*10;clearInterval(S.quiz.timer);}render();if(S.quiz.active)startQT();},900);
}

// ═══════════════════════════════════
// FLASHCARDS LOGIC
// ═══════════════════════════════════
function rateFC(id,q,total){
  const card=FC_CARDS.find(c=>c.id===id);if(!card)return;
  card.reps++;
  if(q<3){card.interval=1;card.ease=Math.max(1.3,card.ease-.2);}
  else{card.interval=card.reps===1?1:card.reps===2?6:Math.round(card.interval*card.ease);card.ease=Math.max(1.3,card.ease+(0.1-(5-q)*(0.08+(5-q)*0.02)));}
  card.due=Date.now()+card.interval*24*60*60*1000;
  S.fc.session=S.fc.session||[];S.fc.session.push(q);
  S.fc.flipped=false;
  SFX.flip();
  const due=FC_CARDS.filter(c=>c.due<=Date.now());
  if(S.fc.idx+1>=due.length){S.fc.mode='result';if(S.user)S.user.xp+=5;showXP('+5 XP');SFX.xp();}
  else S.fc.idx++;
  saveState();
  render();
}

// DAY TIMER
// ═══════════════════════════════════
function startDayTimer(){
  const ids=['dayT','cht'];
  let now=new Date(),end=new Date(now);end.setHours(23,59,59,0);
  function tick(){
    ids.forEach(id=>{const el=document.getElementById(id);if(!el)return;let d=Math.max(0,end-new Date());let h=Math.floor(d/3600000),m=Math.floor(d%3600000/60000),s=Math.floor(d%60000/1000);el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;});
    setTimeout(tick,1000);
  }tick();
}
